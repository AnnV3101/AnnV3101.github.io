<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeusCoder | Главная</title>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@400,500,600,700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-heading: 'Clash Grotesk', sans-serif;
      --font-body: 'Satoshi', sans-serif;
      
      --text: #ffffff;
      --text-light: #e0e0e0;
      --accent: #3b82f6;
      --accent-dark: #2563eb;
      --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --border: rgba(255, 255, 255, 0.15);
      --card-bg: rgba(0, 0, 0, 0.3);
      --card-bg-light: rgba(0, 0, 0, 0.2);
      --shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
      --overlay: rgba(0, 0, 0, 0.4);
    }

    .light-theme {
      --text: #0f172a;
      --text-light: #334155;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --accent-gradient: linear-gradient(135deg, #2563eb, #7c3aed);
      --border: rgba(0, 0, 0, 0.1);
      --card-bg: rgba(255, 255, 255, 0.3);
      --card-bg-light: rgba(255, 255, 255, 0.2);
      --shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
      --overlay: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      line-height: 1.6;
      min-height: 100vh;
      
      background-color: #0f172a;
      background-image: url('dark-bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      
      transition: background-image 0.3s ease;
      position: relative;
    }

    body.light-theme {
      background-color: #f0f4f8;
      background-image: url('light-bg.jpg');
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--overlay);
      z-index: -1;
      pointer-events: none;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1.5rem 2.5rem;
      min-height: 100vh;
    }

    /* Теперь фон есть только у блоков с контентом */
    .navbar, .hero, .footer {
      background-color: var(--card-bg);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }

    .logo {
      font-family: var(--font-heading);
      font-size: 2.2rem;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      gap: 3rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--text-light);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.1rem;
      transition: all 0.2s;
      padding: 0.5rem 0;
      border-bottom: 2px solid transparent;
    }

    .nav-links a:hover {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    .theme-toggle {
      cursor: pointer;
      width: 44px;
      height: 44px;
      transition: all 0.3s;
      margin-left: 0.5rem;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
    }

    .theme-toggle:hover {
      transform: scale(1.15) rotate(8deg);
      border-color: var(--accent);
      box-shadow: 0 0 25px var(--accent);
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-family: var(--font-heading);
      font-size: 4.5rem;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1.1;
      max-width: 1000px;
      margin-bottom: 1.5rem;
      color: var(--text);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .hero .accent {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 1.3rem;
      color: var(--text-light);
      max-width: 700px;
      margin-bottom: 2rem;
      text-shadow: 0 1px 5px rgba(0, 0, 0, 0.2);
    }

    .buttons {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      border-radius: 60px;
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 1.1rem;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      position: relative;
      overflow: hidden;
      z-index: 1;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 35px -5px rgba(59, 130, 246, 0.7);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3);
    }

    .video-container {
      max-width: 450px;
      margin: 1rem auto;
      border-radius: 40px;
      overflow: hidden;
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
    }

    video {
      width: 100%;
      display: block;
    }

    .counter {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text);
      margin: 1rem 0;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .counter small {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-light);
    }

    .footer {
      text-align: center;
      margin-top: 2rem;
    }

    .social-links {
      display: flex;
      gap: 3rem;
      justify-content: center;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }

    .social-link {
      color: var(--text-light);
      text-decoration: none;
      font-size: 1.1rem;
      transition: all 0.2s;
      border-bottom: 1px dotted transparent;
      padding-bottom: 0.2rem;
    }

    .social-link:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .copy {
      color: var(--text-light);
      font-size: 0.95rem;
      opacity: 0.8;
    }

    /* ===== МОБИЛЬНАЯ ВЕРСИЯ ===== */
    @media (max-width: 768px) {
      body {
        background-attachment: scroll;
      }
      
      .container {
        padding: 1rem;
      }

      .navbar, .hero, .footer {
        padding: 1rem;
        border-radius: 20px;
      }

      .navbar {
        flex-direction: column;
        gap: 1rem;
      }

      .logo {
        font-size: 1.8rem;
      }

      .nav-links {
        gap: 1.2rem;
        justify-content: center;
      }

      .nav-links a {
        font-size: 0.95rem;
      }

      .theme-toggle {
        width: 36px;
        height: 36px;
        margin-left: 0;
      }

      .hero h1 {
        font-size: 2.5rem;
      }

      .hero p {
        font-size: 1.1rem;
      }

      .buttons {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        width: 100%;
      }

      .btn {
        width: 100%;
        max-width: 300px;
        padding: 0.9rem 1.5rem;
        font-size: 1rem;
      }

      .video-container {
        max-width: 100%;
        border-radius: 20px;
      }

      .counter {
        font-size: 1.8rem;
      }

      .counter small {
        font-size: 0.95rem;
      }

      .social-links {
        gap: 1.5rem;
      }

      .social-link {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="logo">DeusCoder</div>
      <div class="nav-links">
        <a href="/">Главная</a>
        <a href="/courses/">Уроки</a>
        <a href="/shorts/">Shorts</a>
        <a href="/premium/">Premium</a>
        <a href="/blog/">Блог</a>
        <a href="/about/">О нас</a>
        <img src="lightbulb.jpg" class="theme-toggle" onclick="toggleTheme()" alt="Переключить тему">
      </div>
    </nav>

    <section class="hero">
      <h1>
        Программирование <br><span class="accent">за 10 минут</span>
      </h1>
      <p>
        Короткие уроки, понятные примеры, никакой воды.<br>Учись в своём темпе.
      </p>
      
      <div class="buttons">
        <a href="/courses/" class="btn btn-primary">Начать учиться бесплатно</a>
        <a href="/shorts/" class="btn btn-secondary">Смотреть короткие видео</a>
      </div>

      <div class="video-container">
        <video controls autoplay muted loop playsinline>
          <source src="promo.mp4" type="video/mp4">
          Твой браузер не поддерживает видео.
        </video>
      </div>

      <div class="counter">
        <span>1337</span> <small>учеников уже с нами</small>
      </div>
    </section>

    <footer class="footer">
      <div class="social-links">
        <a href="https://tiktok.com/@jordan_nortan" class="social-link" target="_blank">TikTok</a>
        <a href="https://t.me/jordan_nortan" class="social-link" target="_blank">Telegram</a>
        <a href="https://youtube.com/@jordan_nortan" class="social-link" target="_blank">YouTube</a>
      </div>
      <div class="copy">⚡ DeusCoder • 2026 • Пиши код. Живи будущим.</div>
    </footer>
  </div>

  <script>
    function toggleTheme() {
      const body = document.body;
      const isLight = body.classList.contains('light-theme');
      if (isLight) {
        body.classList.remove('light-theme');
        localStorage.setItem('theme', 'dark');
      } else {
        body.classList.add('light-theme');
        localStorage.setItem('theme', 'light');
      }
    }

    (function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
      }
    })();
  </script>
</body>
</html>
