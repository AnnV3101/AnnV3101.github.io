<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeusCoder | Главная</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --text: #f1f5f9;
      --text-light: #cbd5e1;
      --accent: #38bdf8;
      --accent-dark: #0284c7;
      --border: rgba(255, 255, 255, 0.15);
      --card-bg: rgba(15, 23, 42, 0.6);
      --shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.4);
      --footer-border: rgba(255, 255, 255, 0.1);
    }

    .light-theme {
      --text: #0b1e2e;
      --text-light: #1e3a5f;
      --accent: #1e4a6b;
      --accent-dark: #0f2c40;
      --border: rgba(0, 0, 0, 0.1);
      --card-bg: rgba(255, 255, 255, 0.5);
      --shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1);
      --footer-border: rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      transition: background-image 0.3s ease;
    }

    body {
      background-image: url('dark-bg.jpg');
    }

    body.light-theme {
      background-image: url('light-bg.jpg');
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      backdrop-filter: blur(8px);
      background-color: var(--card-bg);
      min-height: 100vh;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* Навигация */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--text-light);
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      transition: color 0.2s;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid transparent;
    }

    .nav-links a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Лампочка */
    .theme-toggle {
      cursor: pointer;
      width: 40px;
      height: 40px;
      transition: transform 0.2s;
      margin-left: 0.5rem;
      border-radius: 50%;
      box-shadow: 0 0 0 1px var(--border);
    }

    .theme-toggle:hover {
      transform: scale(1.1) rotate(8deg);
      box-shadow: 0 0 0 2px var(--accent);
    }

    .theme-toggle:active {
      transform: scale(0.95);
    }

    /* Герой */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin: 2rem 0 4rem;
    }

    .hero h1 {
      font-size: 3.8rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.2;
      max-width: 900px;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .hero .accent {
      color: var(--accent);
    }

    .hero p {
      font-size: 1.3rem;
      color: var(--text-light);
      max-width: 650px;
      margin-bottom: 2.5rem;
    }

    /* Кнопки */
    .buttons {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 4rem;
    }

    .btn {
      display: inline-block;
      padding: 0.9rem 2.2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid var(--border);
      backdrop-filter: blur(5px);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: transparent;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
      transform: translateY(-3px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-3px);
    }

    /* Видео */
    .video-container {
      max-width: 420px;
      margin: 2rem auto 3rem;
      border-radius: 30px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    video {
      width: 100%;
      display: block;
    }

    /* Счётчик */
    .counter {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      margin: 2rem 0;
    }

    .counter small {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-light);
    }

    /* Футер */
    .footer {
      margin-top: 5rem;
      text-align: center;
      padding: 2rem 0;
      border-top: 1px solid var(--footer-border);
    }

    .social-links {
      display: flex;
      gap: 2.5rem;
      justify-content: center;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }

    .social-link {
      color: var(--text-light);
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.2s;
      border-bottom: 1px dotted transparent;
    }

    .social-link:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .copy {
      color: var(--text-light);
      font-size: 0.9rem;
      opacity: 0.8;
    }

    /* Адаптивность */
    @media (max-width: 700px) {
      .navbar {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem 0;
      }
      .nav-links {
        gap: 1.5rem;
        justify-content: center;
      }
      .hero h1 {
        font-size: 2.5rem;
      }
      .hero p {
        font-size: 1.1rem;
      }
      .buttons {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .btn {
        width: 100%;
        max-width: 300px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="logo">DeusCoder</div>
      <div class="nav-links">
        <a href="/">Главная</a>
        <a href="/courses/">Уроки</a>
        <a href="/shorts/">Shorts</a>
        <a href="/premium/">Premium</a>
        <a href="/blog/">Блог</a>
        <a href="/about/">О нас</a>
        <img src="lightbulb.jpg" class="theme-toggle" onclick="toggleTheme()" alt="Переключить тему">
      </div>
    </nav>

    <section class="hero">
      <h1>
        Программирование <br><span class="accent">за 10 минут</span>
      </h1>
      <p>
        Короткие уроки, понятные примеры, никакой воды.<br>Учись в своём темпе.
      </p>
      
      <div class="buttons">
        <a href="/courses/" class="btn btn-primary">Начать учиться бесплатно</a>
        <a href="/shorts/" class="btn btn-secondary">Смотреть короткие видео</a>
      </div>

      <div class="video-container">
        <video controls autoplay muted loop playsinline>
          <source src="promo.mp4" type="video/mp4">
          Твой браузер не поддерживает видео.
        </video>
      </div>

      <div class="counter">
        <span>1337</span> <small>учеников уже с нами</small>
      </div>
    </section>

    <footer class="footer">
      <div class="social-links">
        <a href="https://tiktok.com/@jordan_nortan" class="social-link" target="_blank">TikTok</a>
        <a href="https://t.me/jordan_nortan" class="social-link" target="_blank">Telegram</a>
        <a href="https://youtube.com/@jordan_nortan" class="social-link" target="_blank">YouTube</a>
      </div>
      <div class="copy">⚡ DeusCoder • 2026 • Пиши код. Живи будущим.</div>
    </footer>
  </div>

  <script>
    function toggleTheme() {
      const body = document.body;
      const isLight = body.classList.contains('light-theme');
      if (isLight) {
        body.classList.remove('light-theme');
        localStorage.setItem('theme', 'dark');
      } else {
        body.classList.add('light-theme');
        localStorage.setItem('theme', 'light');
      }
    }

    (function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
      }
    })();
  </script>
</body>
</html>
