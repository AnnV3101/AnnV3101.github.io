<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeusCoder | Главная</title>
  <style>
    /* ===== ОСНОВНЫЕ СТИЛИ ===== */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #0f172a;
      --text: #f1f5f9;
      --text-light: #94a3b8;
      --accent: #38bdf8;
      --accent-dark: #0284c7;
      --card-bg: #1e293b;
      --border: #334155;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      --footer-border: #334155;
    }

    .light-theme {
      --bg: #ffffff;
      --text: #0f172a;
      --text-light: #475569;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      --footer-border: #e2e8f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      transition: background-color 0.3s ease, color 0.3s ease;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 2rem;
    }

    /* Навигация */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--text-light);
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      transition: color 0.2s;
      border-bottom: 1px solid transparent;
      padding-bottom: 0.25rem;
    }

    .nav-links a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Лампочка */
    .theme-toggle {
      cursor: pointer;
      font-size: 2rem;
      transition: transform 0.2s, color 0.2s;
      margin-left: 0.5rem;
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      color: var(--text-light);
    }

    .theme-toggle::before {
      content: "";
      width: 2px;
      height: 12px;
      background: var(--text-light);
      display: block;
      margin-bottom: 4px;
      transition: background 0.2s;
    }

    .theme-toggle:hover {
      transform: scale(1.1) rotate(2deg);
      color: var(--accent);
    }

    .theme-toggle:hover::before {
      background: var(--accent);
    }

    .theme-toggle:active {
      transform: scale(0.95) rotate(-2deg);
    }

    /* Главный блок */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin: 2rem 0 4rem;
    }

    .hero h1 {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.2;
      max-width: 800px;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .hero .accent {
      color: var(--accent);
    }

    .hero p {
      font-size: 1.25rem;
      color: var(--text-light);
      max-width: 600px;
      margin-bottom: 2.5rem;
    }

    /* Кнопки */
    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 4rem;
    }

    .btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: var(--shadow);
    }

    .btn-primary:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    /* Видео */
    .video-container {
      max-width: 400px;
      margin: 2rem auto 3rem;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    video {
      width: 100%;
      display: block;
    }

    /* Счётчик */
    .counter {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      margin: 2rem 0;
    }

    .counter small {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-light);
    }

    /* Футер */
    .footer {
      margin-top: 5rem;
      text-align: center;
      padding: 2rem 0;
      border-top: 1px solid var(--footer-border);
    }

    .social-links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }

    .social-link {
      color: var(--text-light);
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.2s;
      border-bottom: 1px dotted transparent;
    }

    .social-link:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .copy {
      color: var(--text-light);
      font-size: 0.875rem;
    }

    /* Адаптивность */
    @media (max-width: 700px) {
      .navbar {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem 0;
      }
      .nav-links {
        gap: 1.5rem;
        justify-content: center;
      }
      .hero h1 {
        font-size: 2.5rem;
      }
      .hero p {
        font-size: 1.1rem;
      }
      .buttons {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .btn {
        width: 100%;
        max-width: 300px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="logo">DeusCoder</div>
      <div class="nav-links">
        <a href="/">Главная</a>
        <a href="/courses/">Уроки</a>
        <a href="/shorts/">Shorts</a>
        <a href="/premium/">Premium</a>
        <a href="/blog/">Блог</a>
        <a href="/about/">О нас</a>
        <span class="theme-toggle" onclick="toggleTheme()">💡 </span>
      </div>
    </nav>

    <section class="hero">
      <h1>
        Программирование <br><span class="accent">за 10 минут</span>
      </h1>
      <p>
        Короткие уроки, понятные примеры, никакой воды. <br>Учись в своём темпе.
      </p>
      
      <div class="buttons">
        <a href="/courses/" class="btn btn-primary">Начать учиться бесплатно</a>
        <a href="/shorts/" class="btn btn-secondary">Смотреть короткие видео</a>
      </div>

      <div class="video-container">
        <video controls autoplay muted loop playsinline>
          <source src="promo.mp4" type="video/mp4">
          Твой браузер не поддерживает видео.
        </video>
      </div>

      <div class="counter">
        <span>1337</span> <small>учеников уже с нами</small>
      </div>
    </section>

    <footer class="footer">
      <div class="social-links">
        <a href="https://tiktok.com/@jordan_nortan" class="social-link" target="_blank">TikTok</a>
        <a href="https://t.me/jordan_nortan" class="social-link" target="_blank">Telegram</a>
        <a href="https://youtube.com/@jordan_nortan" class="social-link" target="_blank">YouTube</a>
      </div>
      <div class="copy">⚡ DeusCoder • 2026 • Пиши код. Живи будущим.</div>
    </footer>
  </div>

  <script>
    function toggleTheme() {
      const body = document.body;
      const isLight = body.classList.contains('light-theme');
      if (isLight) {
        body.classList.remove('light-theme');
        localStorage.setItem('theme', 'dark');
      } else {
        body.classList.add('light-theme');
        localStorage.setItem('theme', 'light');
      }
    }

    (function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
      }
    })();
  </script>
</body>
</html>
