<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeusCoder | Главная</title>
  <style>
    /* ===== ОСНОВНЫЕ СТИЛИ ===== */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    :root {
      --bg-color: #0a0c0f;
      --text-color: #e0e0e0;
      --accent-cyan: #00ffff;
      --accent-magenta: #ff00ff;
      --border-color: rgba(0, 255, 255, 0.3);
      --card-bg: rgba(0, 20, 30, 0.7);
      --footer-border: rgba(0, 255, 255, 0.2);
      --glitch-shadow: 0.05em 0 0 rgba(255, 0, 255, 0.7), -0.05em -0.05em 0 rgba(0, 255, 255, 0.7);
    }

    .light-theme {
      --bg-color: #eef2f5;
      --text-color: #0b1a2a;
      --accent-cyan: #007acc;
      --accent-magenta: #c41e3a;
      --border-color: rgba(0, 122, 204, 0.4);
      --card-bg: rgba(255, 255, 255, 0.6);
      --footer-border: rgba(0, 122, 204, 0.3);
      --glitch-shadow: 0.05em 0 0 rgba(196, 30, 58, 0.6), -0.05em -0.05em 0 rgba(0, 122, 204, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      position: relative;
      min-height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(var(--accent-cyan) 0.1px, transparent 0.1px),
        linear-gradient(90deg, var(--accent-cyan) 0.1px, transparent 0.1px);
      background-size: 40px 40px;
      opacity: 0.03;
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
    }

    /* Навигация */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 2rem;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent-cyan);
      text-shadow: 0 0 10px var(--accent-cyan);
      letter-spacing: 2px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--accent-cyan);
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
      border-bottom: 1px solid transparent;
    }

    .nav-links a:hover {
      border-bottom-color: var(--accent-magenta);
      color: var(--accent-magenta);
      text-shadow: 0 0 8px var(--accent-magenta);
    }

    /* Лампочка с верёвочкой */
    .theme-toggle {
      cursor: pointer;
      font-size: 2rem;
      transition: transform 0.2s, text-shadow 0.2s;
      margin-left: 0.5rem;
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
    }

    .theme-toggle::before {
      content: "";
      width: 2px;
      height: 12px;
      background: var(--accent-cyan);
      display: block;
      margin-bottom: 4px;
      box-shadow: 0 0 8px var(--accent-cyan);
      transition: background 0.2s, box-shadow 0.2s;
    }

    .theme-toggle:hover {
      transform: scale(1.2) rotate(3deg);
      text-shadow: 0 0 15px gold;
    }

    .theme-toggle:hover::before {
      background: gold;
      box-shadow: 0 0 12px gold;
    }

    .theme-toggle:active {
      transform: scale(0.9) rotate(-3deg);
    }

    /* Главный блок */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin: 2rem 0 3rem;
    }

    .glitch {
      font-size: 3.5rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-color);
      text-shadow: var(--glitch-shadow);
      animation: glitch-anim 3s infinite linear alternate;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    @keyframes glitch-anim {
      0% { text-shadow: 0.05em 0 0 var(--accent-magenta), -0.05em -0.05em 0 var(--accent-cyan); }
      25% { text-shadow: -0.05em -0.025em 0 var(--accent-magenta), 0.025em 0.05em 0 var(--accent-cyan); }
      50% { text-shadow: 0.025em 0.05em 0 var(--accent-magenta), 0.05em 0 0 var(--accent-cyan); }
      75% { text-shadow: 0.05em 0 0 var(--accent-magenta), -0.05em -0.05em 0 var(--accent-cyan); }
      100% { text-shadow: -0.025em 0 0 var(--accent-magenta), 0.025em -0.025em 0 var(--accent-cyan); }
    }

    .subhead {
      font-size: 1.4rem;
      color: var(--text-color);
      opacity: 0.9;
      max-width: 700px;
      margin: 0.5rem auto 2rem;
    }

    .buttons {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin: 1rem 0 2rem;
    }

    .btn {
      display: inline-block;
      padding: 0.9rem 2.5rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.2rem;
      text-decoration: none;
      transition: 0.3s;
      border: 2px solid transparent;
    }

    .btn-primary {
      background: var(--accent-cyan);
      color: var(--bg-color);
      box-shadow: 0 0 20px var(--accent-cyan);
    }

    .btn-primary:hover {
      background: transparent;
      color: var(--accent-cyan);
      border-color: var(--accent-cyan);
      box-shadow: 0 0 30px var(--accent-cyan);
    }

    .btn-secondary {
      background: transparent;
      color: var(--accent-magenta);
      border: 2px solid var(--accent-magenta);
      box-shadow: 0 0 15px var(--accent-magenta);
    }

    .btn-secondary:hover {
      background: var(--accent-magenta);
      color: var(--bg-color);
      box-shadow: 0 0 30px var(--accent-magenta);
    }

    /* Видео (файл в корне) */
    .video-container {
      max-width: 400px;
      margin: 2rem auto;
      border: 2px solid var(--accent-cyan);
      border-radius: 30px;
      padding: 1rem;
      background: var(--card-bg);
      backdrop-filter: blur(5px);
      box-shadow: 0 0 40px var(--accent-cyan);
    }

    video {
      width: 100%;
      border-radius: 20px;
      display: block;
    }

    .counter {
      margin: 2rem 0;
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent-cyan);
      text-shadow: 0 0 15px var(--accent-cyan);
    }

    .counter small {
      font-size: 1.2rem;
      color: var(--text-color);
      opacity: 0.7;
      font-weight: 400;
    }

    /* Футер */
    .footer {
      margin-top: 4rem;
      text-align: center;
      padding: 2rem 0;
      border-top: 1px solid var(--footer-border);
    }

    .social-links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }

    .social-link {
      color: var(--accent-cyan);
      text-decoration: none;
      font-size: 1.3rem;
      transition: 0.2s;
      border-bottom: 1px dotted transparent;
    }

    .social-link:hover {
      border-bottom-color: var(--accent-magenta);
      color: var(--accent-magenta);
      text-shadow: 0 0 10px var(--accent-magenta);
    }

    .copy {
      color: var(--text-color);
      opacity: 0.6;
      font-size: 0.95rem;
    }

    @media (max-width: 700px) {
      .navbar {
        flex-direction: column;
        gap: 0.8rem;
        padding: 0.5rem 0;
      }
      .logo {
        font-size: 1.5rem;
      }
      .nav-links {
        gap: 1rem;
        justify-content: center;
      }
      .nav-links a {
        font-size: 0.95rem;
      }
      .glitch {
        font-size: 2.2rem;
      }
      .subhead {
        font-size: 1rem;
      }
      .buttons {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .btn {
        width: 80%;
        text-align: center;
        padding: 0.7rem 1rem;
      }
      .video-container {
        max-width: 100%;
        margin: 1rem auto;
        padding: 0.5rem;
      }
      .counter {
        font-size: 1.5rem;
      }
      .counter small {
        font-size: 1rem;
      }
      .social-links {
        gap: 1rem;
        flex-direction: column;
        align-items: center;
      }
      .social-link {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="logo">DeusCoder</div>
      <div class="nav-links">
        <a href="/">Главная</a>
        <a href="/courses/">Уроки</a>
        <a href="/shorts/">Shorts</a>
        <a href="/premium/">Premium</a>
        <a href="/blog/">Блог</a>
        <a href="/about/">О нас</a>
        <span class="theme-toggle" onclick="toggleTheme()">💡 </span>
      </div>
    </nav>

    <section class="hero">
      <h1 class="glitch">Программирование за 10 минут</h1>
      <p class="subhead">Короткие уроки, понятные примеры, никакой воды. Учись в своём темпе.</p>
      
      <div class="buttons">
        <a href="/courses/" class="btn btn-primary">Начать учиться бесплатно</a>
        <a href="/shorts/" class="btn btn-secondary">Смотреть короткие видео</a>
      </div>

      <!-- Видео из корня репозитория -->
      <div class="video-container">
        <video controls autoplay muted loop playsinline width="100%">
          <source src="promo.mp4" type="video/mp4">
          Твой браузер не поддерживает видео.
        </video>
      </div>

      <div class="counter">
        <span>1337</span> <small>учеников уже с нами</small>
      </div>
    </section>

    <footer class="footer">
      <div class="social-links">
        <a href="https://tiktok.com/jordan_nortan" class="social-link" target="_blank">TikTok</a>
        <a href="https://t.me/jordan_nortan" class="social-link" target="_blank">Telegram</a>
        <a href="https://youtube.com/jordan_nortan" class="social-link" target="_blank">YouTube</a>
      </div>
      <div class="copy">⚡ DeusCoder • 2026 • Пиши код. Живи будущим.</div>
    </footer>
  </div>

  <script>
    function toggleTheme() {
      const body = document.body;
      const isLight = body.classList.contains('light-theme');
      if (isLight) {
        body.classList.remove('light-theme');
        localStorage.setItem('theme', 'dark');
      } else {
        body.classList.add('light-theme');
        localStorage.setItem('theme', 'light');
      }
    }

    (function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
      }
    })();
  </script>
</body>
</html>
