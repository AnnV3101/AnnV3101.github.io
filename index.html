<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeusCoder | Главная</title>
  <!-- Современные шрифты -->
  <link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@400,500,600,700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-heading: 'Clash Grotesk', sans-serif;
      --font-body: 'Satoshi', sans-serif;
      
      --text: #f1f5f9;
      --text-light: #cbd5e1;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --border: rgba(255, 255, 255, 0.1);
      --card-bg: rgba(15, 23, 42, 0.5);
      --shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.5);
      --glow: 0 0 0 1px rgba(59, 130, 246, 0.3);
    }

    .light-theme {
      --text: #0b1e2e;
      --text-light: #1e3a5f;
      --accent: #1e4a6b;
      --accent-dark: #0f2c40;
      --accent-gradient: linear-gradient(135deg, #1e4a6b, #4a5568);
      --border: rgba(0, 0, 0, 0.08);
      --card-bg: rgba(255, 255, 255, 0.4);
      --shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.1);
      --glow: 0 0 0 1px rgba(0, 0, 0, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      line-height: 1.6;
      min-height: 100vh;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      transition: background-image 0.3s ease;
    }

    body {
      background-image: url('dark-bg.jpg');
    }

    body.light-theme {
      background-image: url('light-bg.jpg');
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1.5rem 2.5rem;
      backdrop-filter: blur(12px);
      background-color: var(--card-bg);
      min-height: 100vh;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      box-shadow: var(--glow);
    }

    /* Навигация */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      padding: 1.8rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4rem;
    }

    .logo {
      font-family: var(--font-heading);
      font-size: 2.2rem;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      gap: 3rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--text-light);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.1rem;
      transition: all 0.2s;
      padding: 0.5rem 0;
      border-bottom: 2px solid transparent;
    }

    .nav-links a:hover {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    /* Лампочка */
    .theme-toggle {
      cursor: pointer;
      width: 44px;
      height: 44px;
      transition: all 0.3s;
      margin-left: 0.5rem;
      border-radius: 50%;
      border: 1px solid var(--border);
      object-fit: cover;
    }

    .theme-toggle:hover {
      transform: scale(1.15) rotate(8deg);
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent);
    }

    /* Герой */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin: 3rem 0 5rem;
    }

    .hero h1 {
      font-family: var(--font-heading);
      font-size: 4.5rem;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1.1;
      max-width: 1000px;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .hero .accent {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      font-size: 1.3rem;
      color: var(--text-light);
      max-width: 700px;
      margin-bottom: 3rem;
    }

    /* Кнопки — современные, сочные */
    .buttons {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 5rem;
    }

    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      border-radius: 60px;
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 1.1rem;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .btn-primary {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 30px -5px rgba(37, 99, 235, 0.6);
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: -1;
    }

    .btn-primary:hover::before {
      opacity: 1;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.2);
    }

    /* Видео */
    .video-container {
      max-width: 450px;
      margin: 2rem auto 4rem;
      border-radius: 40px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    video {
      width: 100%;
      display: block;
    }

    /* Счётчик */
    .counter {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text);
      margin: 2rem 0;
    }

    .counter small {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-light);
    }

    /* Футер */
    .footer {
      margin-top: 6rem;
      text-align: center;
      padding: 2.5rem 0;
      border-top: 1px solid var(--border);
    }

    .social-links {
      display: flex;
      gap: 3rem;
      justify-content: center;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .social-link {
      color: var(--text-light);
      text-decoration: none;
      font-size: 1.1rem;
      transition: all 0.2s;
      border-bottom: 1px dotted transparent;
      padding-bottom: 0.2rem;
    }

    .social-link:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .copy {
      color: var(--text-light);
      font-size: 0.95rem;
      opacity: 0.7;
    }

    /* Адаптивность */
    @media (max-width: 700px) {
      .container {
        padding: 1rem 1.5rem;
      }
      .navbar {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem 0;
      }
      .nav-links {
        gap: 1.5rem;
        justify-content: center;
      }
      .hero h1 {
        font-size: 2.8rem;
      }
      .hero p {
        font-size: 1.1rem;
      }
      .buttons {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .btn {
        width: 100%;
        max-width: 300px;
        text-align: center;
      }
      .social-links {
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="logo">DeusCoder</div>
      <div class="nav-links">
        <a href="/">Главная</a>
        <a href="/courses/">Уроки</a>
        <a href="/shorts/">Shorts</a>
        <a href="/premium/">Premium</a>
        <a href="/blog/">Блог</a>
        <a href="/about/">О нас</a>
        <img src="lightbulb.jpg" class="theme-toggle" onclick="toggleTheme()" alt="Переключить тему">
      </div>
    </nav>

    <section class="hero">
      <h1>
        Программирование <br><span class="accent">за 10 минут</span>
      </h1>
      <p>
        Короткие уроки, понятные примеры, никакой воды.<br>Учись в своём темпе.
      </p>
      
      <div class="buttons">
        <a href="/courses/" class="btn btn-primary">Начать учиться бесплатно</a>
        <a href="/shorts/" class="btn btn-secondary">Смотреть короткие видео</a>
      </div>

      <div class="video-container">
        <video controls autoplay muted loop playsinline>
          <source src="promo.mp4" type="video/mp4">
          Твой браузер не поддерживает видео.
        </video>
      </div>

      <div class="counter">
        <span>1337</span> <small>учеников уже с нами</small>
      </div>
    </section>

    <footer class="footer">
      <div class="social-links">
        <a href="https://tiktok.com/@jordan_nortan" class="social-link" target="_blank">TikTok</a>
        <a href="https://t.me/jordan_nortan" class="social-link" target="_blank">Telegram</a>
        <a href="https://youtube.com/@jordan_nortan" class="social-link" target="_blank">YouTube</a>
      </div>
      <div class="copy">⚡ DeusCoder • 2026 • Пиши код. Живи будущим.</div>
    </footer>
  </div>

  <script>
    function toggleTheme() {
      const body = document.body;
      const isLight = body.classList.contains('light-theme');
      if (isLight) {
        body.classList.remove('light-theme');
        localStorage.setItem('theme', 'dark');
      } else {
        body.classList.add('light-theme');
        localStorage.setItem('theme', 'light');
      }
    }

    (function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
      }
    })();
  </script>
</body>
</html>
